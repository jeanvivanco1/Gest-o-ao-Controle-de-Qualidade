<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechFlow Tasks | Gestão Ágil Logística</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- CSS Personalizado -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Background Glows para Efeito Estético Moderno -->
  <div class="glow-bg glow-1"></div>
  <div class="glow-bg glow-2"></div>

  <div class="app-container">
    <header class="app-header">
      <div class="header-logo">
        <span class="logo-icon">⚡</span>
        <h1>TechFlow <span class="accent-text">Tasks</span></h1>
      </div>
      <p class="header-subtitle">Gestão de Fluxo Ágil - Startup de Logística</p>
      
      <div class="actions-bar">
        <button id="btn-new-task" class="btn btn-primary" onclick="openModal()">
          <span class="btn-icon">+</span> Nova Tarefa
        </button>
      </div>
    </header>

    <!-- Quadro Kanban -->
    <main class="kanban-board">
      <!-- Coluna: A Fazer -->
      <section class="kanban-column" id="col-todo">
        <div class="column-header">
          <div class="column-indicator indicator-todo"></div>
          <h2>A Fazer</h2>
          <span class="task-count" id="count-todo">0</span>
        </div>
        <div class="task-list" id="list-todo" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'A Fazer')">
          <!-- Tarefas carregadas via JS -->
        </div>
      </section>

      <!-- Coluna: Em Progresso -->
      <section class="kanban-column" id="col-inprogress">
        <div class="column-header">
          <div class="column-indicator indicator-progress"></div>
          <h2>Em Progresso</h2>
          <span class="task-count" id="count-inprogress">0</span>
        </div>
        <div class="task-list" id="list-inprogress" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'Em Progresso')">
          <!-- Tarefas carregadas via JS -->
        </div>
      </section>

      <!-- Coluna: Concluído -->
      <section class="kanban-column" id="col-done">
        <div class="column-header">
          <div class="column-indicator indicator-done"></div>
          <h2>Concluído</h2>
          <span class="task-count" id="count-done">0</span>
        </div>
        <div class="task-list" id="list-done" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'Concluído')">
          <!-- Tarefas carregadas via JS -->
        </div>
      </section>
    </main>
  </div>

  <!-- Modal para Criação/Edição de Tarefas -->
  <div id="task-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Nova Tarefa Logística</h3>
        <span class="close-btn" onclick="closeModal()">&times;</span>
      </div>
      <form id="task-form" onsubmit="saveTask(event)">
        <input type="hidden" id="task-id">
        <div class="form-group">
          <label for="input-title">Título da Tarefa</label>
          <input type="text" id="input-title" placeholder="Ex: Roteirizar cargas do caminhão #4" required>
        </div>
        <div class="form-group">
          <label for="input-desc">Descrição / Detalhes</label>
          <textarea id="input-desc" rows="4" placeholder="Detalhes do envio, prioridades logísticas ou observações..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn btn-submit">Salvar Tarefa</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
</body>
</html>
